{% extends "base.html" %}
{% block content %}
<div class="row justify-content-center mt-5">
  <div class="col-md-4">
    <div class="text-center mb-4">
      <img src="/static/img/logo.svg" alt="FNX" style="height:36px;width:auto;" />
    </div>
    <div class="fnx-form-card">
      <div class="fnx-form-header">
        <i class="bi bi-lock" style="color:#999;"></i>
        <span class="fnx-form-header-title">Acessar Plataforma</span>
      </div>
      <div class="fnx-form-body">
        {% if erro %}
        <div class="fnx-alert mb-3"><i class="bi bi-x-circle me-2"></i>{{ erro }}</div>
        {% endif %}
        <form method="post">
          <div class="mb-3">
            <label class="fnx-label">E-mail</label>
            <input type="email" name="email" class="fnx-input form-control" placeholder="seu@email.com" required />
          </div>
          <div class="mb-4">
            <label class="fnx-label">Senha</label>
            <input type="password" name="senha" class="fnx-input form-control" placeholder="••••••••" required />
          </div>
          <button type="submit" class="btn-fnx-outline">Entrar</button>
        </form>
        <div class="text-center mt-3" style="font-size:0.75rem;color:#555;">
          Não tem conta? <a href="/cadastro" style="color:#fff;">Criar conta</a>
        </div>
      </div>
    </div>
  </div>
</div>
{% endblock %}
